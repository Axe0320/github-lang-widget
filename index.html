<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>github-lang-widget</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    color-scheme: light;
  }
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    padding: 64px 24px 48px;
    background: #f6f8fa;
    color: #1f2328;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    max-width: 1000px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    margin-bottom: 56px;
  }
  h1 {
    font-size: 28px;
    margin: 0 0 8px;
  }
  header p {
    margin: 0;
    color: #57606a;
    font-size: 15px;
  }
  section {
    margin-bottom: 48px;
  }
  h2 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #57606a;
    margin: 0 0 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #d0d7de;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
  }
  .card {
    background: #ffffff;
    border: 1px solid #d0d7de;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .card img {
    width: 100%;
    border-radius: 8px;
    display: block;
  }
  .card span {
    font-size: 13px;
    color: #57606a;
  }
  footer {
    text-align: center;
    margin-top: 56px;
    font-size: 13px;
    color: #57606a;
  }
  a {
    color: #0969da;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }
  code {
    background: #eaeef2;
    border: 1px solid #d0d7de;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.9em;
  }
</style>
</head>
<body>
  <main>
    <header>
      <h1>github-lang-widget</h1>
      <p>Axe0320 アカウントの全 public リポジトリを横断集計した GitHub 言語使用率を <code>/api/chart</code> がPNGとして生成しています</p>
    </header>

    <section>
      <h2>Dark</h2>
      <div class="grid">
        <div class="card">
          <img src="/api/chart?w=600&h=600&legendCount=3&theme=dark&rowBars=0" alt="small widget preview (dark)" />
          <span>small</span>
        </div>
        <div class="card">
          <img src="/api/chart?w=1280&h=600&legendCount=3&theme=dark&rowBars=1&rowScale=1.6" alt="medium widget preview (dark)" />
          <span>medium</span>
        </div>
        <div class="card">
          <img src="/api/chart?w=1280&h=1280&legendCount=8&theme=dark&rowBars=1" alt="large widget preview (dark)" />
          <span>large</span>
        </div>
        <div class="card">
          <img src="/api/chart?w=2048&h=1280&legendCount=10&theme=dark&rowBars=1" alt="extraLarge widget preview (dark)" />
          <span>extraLarge (iPad)</span>
        </div>
      </div>
    </section>

    <section>
      <h2>Light</h2>
      <div class="grid">
        <div class="card">
          <img src="/api/chart?w=600&h=600&legendCount=3&theme=light&rowBars=0" alt="small widget preview (light)" />
          <span>small</span>
        </div>
        <div class="card">
          <img src="/api/chart?w=1280&h=600&legendCount=3&theme=light&rowBars=1&rowScale=1.6" alt="medium widget preview (light)" />
          <span>medium</span>
        </div>
        <div class="card">
          <img src="/api/chart?w=1280&h=1280&legendCount=8&theme=light&rowBars=1" alt="large widget preview (light)" />
          <span>large</span>
        </div>
        <div class="card">
          <img src="/api/chart?w=2048&h=1280&legendCount=10&theme=light&rowBars=1" alt="extraLarge widget preview (light)" />
          <span>extraLarge (iPad)</span>
        </div>
      </div>
    </section>

    <footer>
      <a href="https://github.com/Axe0320/github-lang-widget">github.com/Axe0320/github-lang-widget</a>
    </footer>
  </main>
</body>
</html>
