<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>github-lang-widget</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body {
    margin: 0;
    min-height: 100vh;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    background: #0d1117;
    color: #8b949e;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 24px;
    max-width: 1100px;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .card img {
    max-width: 320px;
    width: 100%;
    border-radius: 12px;
  }
  .card span {
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  a {
    color: #58a6ff;
  }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <img src="/api/chart?w=600&h=600&legendCount=0" alt="small widget preview" />
      <span>small</span>
    </div>
    <div class="card">
      <img src="/api/chart?w=1280&h=600&legendCount=3" alt="medium widget preview" />
      <span>medium</span>
    </div>
    <div class="card">
      <img src="/api/chart?w=1280&h=1280&legendCount=8" alt="large widget preview" />
      <span>large</span>
    </div>
    <div class="card">
      <img src="/api/chart?w=2048&h=1280&legendCount=10" alt="extraLarge widget preview" />
      <span>extraLarge (iPad)</span>
    </div>
  </div>
  <p><a href="https://github.com/Axe0320/github-lang-widget">github-lang-widget</a> — /api/chart で画像を生成しています</p>
</body>
</html>
